app:
  id: ari:cloud:ecosystem::app/90c674aa-5a28-4d95-b7c6-a790c019b8ee
  runtime:
    name: nodejs24.x

permissions:
  scopes:
    - read:jira-work
    - storage:app
  external:
    fetch:
      backend:
        - "https://db-proxy.example.com"

modules:
  jira:projectPage:
    - key: finance-cockpit-panel
      resource: main
      resolver:
        function: resolver
      title: Finance Cockpit
      description: CFO-grade financial dashboard with budget tracking, burn rate, cash
        forecasts, and working capital optimization
      icon: https://developer.atlassian.com/platform/forge/images/icons/finance-icon.svg

  webtrigger:
    - key: finance-cockpit-webtrigger
      function: webhook-handler

  function:
    - key: resolver
      handler: index.handler
    - key: webhook-handler
      handler: webhook.handler

resources:
  - key: main
    path: src/frontend
